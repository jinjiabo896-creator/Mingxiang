<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenFlow 20.0 · 冥想训练营</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; --card: rgba(255,255,255,0.05); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        .container { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }

        /* 呼吸训练圆环 */
        .breath-orb-wrap { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 50px; }
        .orb-bg { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; }
        .orb-main { 
            width: 100px; height: 100px; background: radial-gradient(circle, #fff, var(--accent)); 
            border-radius: 50%; box-shadow: 0 0 50px var(--accent);
            transition: transform 4s ease-in-out; 
        }
        
        /* 训练文字提示 */
        .instruction { font-size: 1.8rem; font-weight: 300; height: 40px; margin-bottom: 10px; color: var(--accent); }
        .sub-instruction { font-size: 0.9rem; opacity: 0.5; margin-bottom: 40px; }

        /* 模式选择 */
        .mode-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .mode-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center; }
        .mode-card h3 { margin: 0; font-size: 1rem; }
        .mode-card p { font-size: 0.7rem; opacity: 0.5; margin: 5px 0 0; }

        /* 播放状态 */
        .training-overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .timer { font-family: monospace; font-size: 1.2rem; color: #666; margin-top: 20px; }
        .btn-exit { margin-top: 50px; padding: 10px 30px; border-radius: 20px; border: 1px solid #444; background: none; color: #666; }
    </style>
</head>
<body>

<div class="container" id="home-view">
    <header style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-weight: 200; letter-spacing: 5px; margin: 0;">ZENFLOW</h1>
        <p style="font-size: 0.8rem; opacity: 0.4;">2026 逻辑驱动 · 深度冥想训练</p>
    </header>

    <div class="mode-list">
        <div class="mode-card" onclick="startTrain('calm', 180)">
            <h3>止念训练</h3>
            <p>3分钟 · 基础呼吸</p>
        </div>
        <div class="mode-card" onclick="startTrain('focus', 300)">
            <h3>专注进阶</h3>
            <p>5分钟 · 意识锁定</p>
        </div>
        <div class="mode-card" onclick="startTrain('deep', 600)">
            <h3>深度入定</h3>
            <p>10分钟 · 全身扫描</p>
        </div>
        <div class="mode-card" onclick="startTrain('sleep', 900)">
            <h3>助眠修复</h3>
            <p>15分钟 · 睡前仪式</p>
        </div>
    </div>
</div>

<!-- 训练实操界面 -->
<div class="training-overlay" id="train-view">
    <div class="instruction" id="main-cue">准备中</div>
    <div class="sub-instruction" id="sub-cue">请找个舒适的姿势坐好</div>

    <div class="breath-orb-wrap">
        <div class="orb-bg"></div>
        <div class="orb-main" id="orb"></div>
    </div>

    <div class="timer" id="timer-display">00:00</div>
    <button class="btn-exit" onclick="exitTrain()">终止练习</button>
</div>

<script>
    // 维度 1：训练逻辑矩阵（不再依赖外部音频）
    const TRAINING_LOGIC = {
        inhale: { text: "深深吸气", sub: "感受能量流入身体", scale: 2.2, duration: 4000 },
        hold: { text: "屏息凝神", sub: "稳住这股能量", scale: 2.2, duration: 2000 },
        exhale: { text: "缓缓呼气", sub: "排除一切杂念", scale: 1.0, duration: 4000 },
        relax: { text: "全身放松", sub: "感受当下的宁静", scale: 1.0, duration: 2000 }
    };

    let timer;
    let secondsLeft;
    let isTraining = false;

    // 核心：调用浏览器内置语音引擎（TTS）- 解决“不出声”的终极手段
    function speak(text) {
        window.speechSynthesis.cancel(); // 先停止之前的
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-CN';
        msg.rate = 0.8; // 慢速，更有禅意
        window.speechSynthesis.speak(msg);
    }

    function startTrain(mode, duration) {
        isTraining = true;
        secondsLeft = duration;
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('train-view').style.display = 'flex';
        
        runCycle();
        
        timer = setInterval(() => {
            secondsLeft--;
            updateTimerDisplay();
            if(secondsLeft <= 0) exitTrain(true);
        }, 1000);
    }

    function runCycle() {
        if(!isTraining) return;

        const orb = document.getElementById('orb');
        const mainCue = document.getElementById('main-cue');
        const subCue = document.getElementById('sub-cue');

        // 第一步：吸气
        applyPhase('inhale', () => {
            // 第二步：屏息
            applyPhase('hold', () => {
                // 第三步：呼气
                applyPhase('exhale', () => {
                    // 第四步：放松/等待
                    applyPhase('relax', runCycle);
                });
            });
        });
    }

    function applyPhase(phaseKey, callback) {
        if(!isTraining) return;
        const p = TRAINING_LOGIC[phaseKey];
        const orb = document.getElementById('orb');
        
        document.getElementById('main-cue').innerText = p.text;
        document.getElementById('sub-cue').innerText = p.sub;
        orb.style.transform = `scale(${p.scale})`;
        orb.style.transition = `transform ${p.duration}ms ease-in-out`;
        
        speak(p.text); // AI 语音引导

        setTimeout(callback, p.duration);
    }

    function updateTimerDisplay() {
        const m = Math.floor(secondsLeft / 60);
        const s = secondsLeft % 60;
        document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
    }

    function exitTrain(isFinished = false) {
        isTraining = false;
        clearInterval(timer);
        window.speechSynthesis.cancel();
        
        if(isFinished) {
            alert("修行圆满，愿你保持这份宁静。");
        }
        
        document.getElementById('home-view').style.display = 'flex';
        document.getElementById('train-view').style.display = 'none';
        document.getElementById('orb').style.transform = 'scale(1)';
    }

    function updateTimerDisplay() {
        const m = Math.floor(secondsLeft / 60);
        const s = secondsLeft % 60;
        document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
    }
</script>
</body>
</html>
