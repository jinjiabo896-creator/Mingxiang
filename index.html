<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenFlow 7.0 · 智能全域冥想</title>
    <style>
        :root { --accent: #81ecec; --bg: #0a0c10; --card: rgba(255,255,255,0.08); }
        body { margin: 0; padding: 0; font-family: -apple-system, 'STKaiti', serif; background: var(--bg); color: white; -webkit-font-smoothing: antialiased; }
        .aurora { position: fixed; inset: 0; background: radial-gradient(circle at 50% -20%, #1e3799, #0a0c10); z-index: -1; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* 顶部成长计划 */
        .growth-card { background: linear-gradient(135deg, #0984e3, #6c5ce7); border-radius: 20px; padding: 20px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 10px; opacity: 0.9; }
        .bar-bg { height: 6px; background: rgba(0,0,0,0.2); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: white; width: 35%; transition: 1s; }

        /* 类目导航 */
        .nav-tabs { display: flex; overflow-x: auto; gap: 12px; padding: 25px 0; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab { flex: 0 0 auto; padding: 10px 20px; border-radius: 25px; background: var(--card); font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .tab.active { background: white; color: black; border-color: white; font-weight: bold; }

        /* 动态音频列表 */
        .list-container { display: grid; gap: 15px; min-height: 300px; }
        .audio-card { background: var(--card); border-radius: 18px; padding: 15px; display: flex; align-items: center; backdrop-filter: blur(10px); animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .audio-img { width: 60px; height: 60px; border-radius: 12px; margin-right: 15px; object-fit: cover; background: #222; }
        .audio-info { flex: 1; }
        .audio-info h4 { margin: 0; font-size: 0.95rem; line-height: 1.3; }
        .audio-info p { margin: 5px 0 0; font-size: 0.7rem; color: var(--accent); }

        /* 全屏播放控制条 */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.98); color: #111; padding: 15px 25px; border-radius: 25px 25px 0 0; display: none; transform: translateY(100%); transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); box-shadow: 0 -10px 30px rgba(0,0,0,0.5); z-index: 1000; }
        .player-bar.active { display: block; transform: translateY(0); }
        .play-flex { display: flex; align-items: center; gap: 15px; }
        .loading-text { text-align: center; padding: 50px; opacity: 0.5; font-size: 0.8rem; letter-spacing: 2px; }

        /* 呼吸按钮 */
        .breath-orb { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, var(--accent), #0984e3); margin: 0 auto; animation: orbBreathe 4s infinite ease-in-out; }
        @keyframes orbBreathe { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.3); opacity: 1; } }
    </style>
</head>
<body>

<div class="aurora"></div>

<div class="container">
    <div class="breath-orb" style="margin-top: 20px;"></div>
    
    <!-- 维度：成长计划 -->
    <div class="growth-card">
        <div class="progress-info">
            <span>21天觉知计划 · 第 8 天</span>
            <span>进度 35%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill"></div></div>
        <p style="margin: 15px 0 0; font-size: 0.75rem; opacity: 0.8;">今日目标：听完一段 10 分钟的“清晨能量”</p>
    </div>

    <!-- 维度：多类目可选 -->
    <div class="nav-tabs">
        <div class="tab active" onclick="switchSource('latest', this)">✨ 最新推荐</div>
        <div class="tab" onclick="switchSource('sleep', this)">🌙 深度睡眠</div>
        <div class="tab" onclick="switchSource('calm', this)">🍃 焦虑缓解</div>
        <div class="tab" onclick="switchSource('wisdom', this)">🧘 智慧修行</div>
    </div>

    <div id="list-status" class="loading-text">正在同步 2024 全球修行库...</div>
    <div class="list-container" id="list"></div>
</div>

<div class="player-bar" id="player">
    <div class="play-flex">
        <div style="flex: 1; overflow: hidden;">
            <div id="p-title" style="font-weight: bold; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">曲目加载中</div>
            <div id="p-status" style="font-size: 0.7rem; color: #666;">准备绪</div>
        </div>
        <div onclick="toggleAudio()" id="playBtn" style="font-size: 2rem; cursor: pointer;">▶</div>
    </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
    // 维度：多类目活跃源（经过 2024 更新筛选）
    const SOURCES = {
        latest: "https://feed.xyzcdn.net/itpt8p5q0f37", // 活跃中文源
        sleep: "https://sleepwithme.libsyn.com/rss",    // 全球最大睡眠源
        calm: "https://meditationminis.libsyn.com/rss", // 极简减压
        wisdom: "https://feeds.simplecast.com/54nAGp74" // 哲学智慧
    };

    const audio = document.getElementById('audio');
    let isPlaying = false;

    async function fetchList(category) {
        const listEl = document.getElementById('list');
        const statusEl = document.getElementById('list-status');
        
        listEl.innerHTML = "";
        statusEl.style.display = "block";
        statusEl.innerText = "⚡ 正在加速加载音频流...";

        const fetchUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(SOURCES[category])}&api_key=your_free_api_key_optional`;

        try {
            const res = await fetch(fetchUrl);
            const data = await res.json();
            
            if (data.status === 'ok') {
                statusEl.style.display = "none";
                // 维度：排序算法 - 确保展示 2024 最新内容
                const sortedItems = data.items.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
                render(sortedItems);
            }
        } catch (e) {
            statusEl.innerText = "❌ 访问超时，请尝试切换类目";
        }
    }

    function render(items) {
        const list = document.getElementById('list');
        list.innerHTML = items.slice(0, 15).map(item => `
            <div class="audio-card" onclick="playAudio('${item.title.replace(/'/g, "")}', '${item.enclosure.link}')">
                <img src="${item.thumbnail || 'https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=120'}" class="audio-img">
                <div class="audio-info">
                    <h4>${item.title}</h4>
                    <p>发布日期：${item.pubDate.split(' ')[0]}</p>
                </div>
                <div style="color:var(--accent)">▶</div>
            </div>
        `).join('');
    }

    function switchSource(cat, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        fetchList(cat);
    }

    function playAudio(title, url) {
        document.getElementById('p-title').innerText = title;
        document.getElementById('p-status').innerText = "⚡ 极速缓存中...";
        
        audio.src = url;
        audio.play();
        
        document.getElementById('player').classList.add('active');
        document.getElementById('playBtn').innerText = "⏸";
        isPlaying = true;

        audio.onplaying = () => document.getElementById('p-status').innerText = "✨ 深度修行中";
    }

    function toggleAudio() {
        if(isPlaying) { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
        else { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
        isPlaying = !isPlaying;
    }

    // 初始化加载最新
    fetchList('latest');
</script>
</body>
</html>
