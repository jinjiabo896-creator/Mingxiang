<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenFlow 6.0 · 播客智联</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.12); --accent: #81ecec; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: #0b0e14; color: white; min-height: 100vh; }
        .aurora { position: fixed; inset: 0; background: linear-gradient(125deg, #0f2027, #2c5364); z-index: -1; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        header { padding: 40px 0 20px; text-align: center; }
        .breathe-btn { width: 120px; height: 120px; border-radius: 50%; background: var(--glass); border: 1px solid rgba(255,255,255,0.2); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; animation: pulse 8s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 1; } }

        /* 播客动态列表 */
        .section-title { font-size: 1.1rem; margin: 30px 0 15px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .podcast-list { display: grid; gap: 15px; }
        .pod-card { background: var(--glass); border-radius: 18px; padding: 15px; display: flex; align-items: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .pod-img { width: 50px; height: 50px; border-radius: 10px; margin-right: 15px; }
        .pod-info { flex: 1; }
        .pod-info h4 { margin: 0; font-size: 0.95rem; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .pod-info p { margin: 5px 0 0; font-size: 0.75rem; opacity: 0.5; }
        .play-icon { font-size: 1.2rem; color: var(--accent); }

        /* 全屏播放器 */
        .player-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(255,255,255,0.95); color: #000; padding: 12px 20px; border-radius: 20px; display: none; align-items: center; justify-content: space-between; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .player-bar.active { display: flex; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .loading-text { text-align: center; opacity: 0.5; padding: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="aurora"></div>

<div class="container">
    <header>
        <div class="breathe-btn"><span>呼 吸</span></div>
        <h2 style="font-weight: 300;">大师引导课</h2>
        <p style="opacity: 0.6; font-size: 0.8rem;">—— 每日自动更新修行内容 ——</p>
    </header>

    <div class="section-title">今日推荐 · 正念播客</div>
    <div id="loading" class="loading-text">📡 正在连接全球冥想基站...</div>
    <div class="podcast-list" id="pod-list">
        <!-- 播客内容将自动填充 -->
    </div>
</div>

<!-- 底部简易播放控制 -->
<div class="player-bar" id="miniPlayer">
    <div style="flex: 1; overflow: hidden;">
        <div id="play-title" style="font-weight:bold; font-size:0.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">未在播放</div>
        <div id="play-status" style="font-size:0.7rem; color:#666;">准备绪</div>
    </div>
    <div onclick="toggleAudio()" style="font-size: 1.5rem; margin-left: 15px;" id="playBtn">▶</div>
</div>

<audio id="audio-engine"></audio>

<script>
    // 你的播客 RSS 链接 (你可以随意更换)
    const RSS_URL = "https://meditationminis.libsyn.com/rss"; // 这是一个国际顶级的冥想源
    const API_KEY = ""; // rss2json 不需要 key 即可基础使用

    const audioEngine = document.getElementById('audio-engine');
    const playerBar = document.getElementById('miniPlayer');
    let isPlaying = false;

    // 核心函数：抓取并解析播客
    async function fetchPodcasts() {
        const fetchUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;
        
        try {
            const response = await fetch(fetchUrl);
            const data = await response.json();
            
            if (data.status === 'ok') {
                document.getElementById('loading').style.display = 'none';
                renderList(data.items);
            } else {
                throw new Error("API 返回错误");
            }
        } catch (e) {
            document.getElementById('loading').innerText = "❌ 信号丢失，请稍后再试";
        }
    }

    function renderList(items) {
        const list = document.getElementById('pod-list');
        list.innerHTML = items.slice(0, 10).map((item, index) => `
            <div class="pod-card" onclick="playPod('${item.title.replace(/'/g, "\\'")}', '${item.enclosure.link}')">
                <img src="${item.thumbnail || 'https://images.unsplash.com/photo-1518241353349-9b57503855f1?w=100'}" class="pod-img">
                <div class="pod-info">
                    <h4>${item.title}</h4>
                    <p>${item.pubDate.split(' ')[0]} · 大师引导</p>
                </div>
                <div class="play-icon">▶</div>
            </div>
        `).join('');
    }

    function playPod(title, url) {
        document.getElementById('play-title').innerText = title;
        document.getElementById('play-status').innerText = "正在加载音频...";
        
        audioEngine.src = url;
        audioEngine.play();
        
        playerBar.classList.add('active');
        document.getElementById('playBtn').innerText = "⏸";
        isPlaying = true;
        
        audioEngine.onplaying = () => {
            document.getElementById('play-status').innerText = "正在修行中...";
        };
    }

    function toggleAudio() {
        if(isPlaying) {
            audioEngine.pause();
            document.getElementById('playBtn').innerText = "▶";
        } else {
            audioEngine.play();
            document.getElementById('playBtn').innerText = "⏸";
        }
        isPlaying = !isPlaying;
    }

    // 启动抓取
    fetchPodcasts();
</script>
</body>
</html>
