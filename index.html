<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenFlow 14.0 · 自动聚合版</title>
    <style>
        :root { --accent: #00d2ff; --bg: #0a0a0c; --glass: rgba(255,255,255,0.06); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; padding-bottom: 120px; }
        
        header { padding: 20px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
        header h1 { font-size: 1.5rem; margin: 0; font-weight: 400; }
        header p { font-size: 0.8rem; color: #666; margin: 5px 0 0; }

        /* 频道选择器 */
        .channel-nav { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .channel-nav::-webkit-scrollbar { display: none; }
        .tab { flex: 0 0 auto; padding: 10px 18px; border-radius: 20px; background: var(--glass); font-size: 0.85rem; border: 1px solid #222; }
        .tab.active { background: #fff; color: #000; border-color: #fff; font-weight: bold; }

        /* 动态列表 */
        .list { display: grid; gap: 12px; }
        .item { background: var(--glass); padding: 15px; border-radius: 16px; display: flex; align-items: center; border: 1px solid transparent; }
        .item:active { border-color: var(--accent); background: rgba(0,210,255,0.05); }
        .item-info { flex: 1; margin-right: 15px; overflow: hidden; }
        .item-info b { display: block; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-info span { font-size: 0.7rem; color: #666; }
        .play-ico { color: var(--accent); font-size: 1.2rem; }

        /* 播放控制 */
        #player { position: fixed; bottom: 20px; left: 15px; right: 15px; background: #fff; color: #000; padding: 15px 20px; border-radius: 20px; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 1000; }
        .p-flex { display: flex; align-items: center; justify-content: space-between; }
        .p-btn { width: 45px; height: 45px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ZenFlow 资源聚合</h1>
        <p>📡 正在实时抓取全球最新冥想课程</p>
    </header>

    <!-- 维度：定义的资源频道 -->
    <div class="channel-nav">
        <div class="tab active" onclick="switchCh('latest', this)">✨ 最新推荐</div>
        <div class="tab" onclick="switchCh('sleep', this)">🌙 助眠引导</div>
        <div class="tab" onclick="switchCh('stress', this)">🍃 焦虑缓解</div>
        <div class="tab" onclick="switchCh('wisdom', this)">🧘 智慧修行</div>
    </div>

    <div id="status" style="text-align:center; padding: 40px; color: #444; font-size: 0.8rem;">正在同步最新音频资源...</div>
    <div class="list" id="list"></div>
</div>

<div id="player">
    <div class="p-flex">
        <div style="flex: 1; overflow: hidden; padding-right: 15px;">
            <div id="p-title" style="font-weight: bold; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">加载中...</div>
            <div id="p-msg" style="font-size: 0.65rem; color: #888;">正在建立云端音频流连接</div>
        </div>
        <div class="p-btn" onclick="toggle()" id="p-btn">⏸</div>
    </div>
</div>

<audio id="audio"></audio>

<script>
    // 维度：这就是我们的“资源渠道库” (RSS 源)
    const CHANNELS = {
        latest: "https://feed.xyzcdn.net/itpt8p5q0f37", // 活跃中文源
        sleep: "https://sleepwithme.libsyn.com/rss",    // 睡眠源
        stress: "https://meditationminis.libsyn.com/rss", // 减压源
        wisdom: "https://feeds.simplecast.com/54n4Gp74" // 智慧源
    };

    const audio = document.getElementById('audio');
    const list = document.getElementById('list');
    const status = document.getElementById('status');

    // 核心逻辑：自动抓取函数
    async function fetchSource(cat) {
        status.style.display = "block";
        list.innerHTML = "";
        
        // 利用免费中转接口将 RSS 变为 JSON
        const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(CHANNELS[cat])}`;
        
        try {
            const res = await fetch(api);
            const data = await res.json();
            
            if(data.status === 'ok') {
                status.style.display = "none";
                render(data.items);
            } else {
                status.innerText = "❌ 该频道暂时无法连接，请尝试其他频道";
            }
        } catch (e) {
            status.innerText = "❌ 信号丢失，请检查网络";
        }
    }

    function render(items) {
        list.innerHTML = items.slice(0, 10).map(item => `
            <div class="item" onclick="play('${item.title.replace(/'/g, "")}', '${item.enclosure.link}')">
                <div class="item-info">
                    <b>${item.title}</b>
                    <span>发布于：${item.pubDate.split(' ')[0]}</span>
                </div>
                <div class="play-ico">▶</div>
            </div>
        `).join('');
    }

    function switchCh(cat, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        fetchSource(cat);
    }

    function play(title, url) {
        document.getElementById('player').style.display = 'block';
        document.getElementById('p-title').innerText = title;
        document.getElementById('p-msg').innerText = "⚡ 正在极速接入音频流...";
        
        audio.src = url;
        audio.play();
        document.getElementById('p-btn').innerText = "⏸";

        audio.onplaying = () => { document.getElementById('p-msg').innerText = "✨ 正在实时传输真人引导课程"; };
    }

    function toggle() {
        if(audio.paused) { audio.play(); document.getElementById('p-btn').innerText = "⏸"; }
        else { audio.pause(); document.getElementById('p-btn').innerText = "▶"; }
    }

    // 启动即抓取最新频道
    fetchSource('latest');
</script>
</body>
</html>
