<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenFlow 9.0 · 真人语音引导</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #a8dadc;
        }
        body {
            margin: 0; padding: 0; font-family: -apple-system, "PingFang SC", sans-serif;
            background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden;
        }
        .aurora {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 30%, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 40px 20px 100px; }

        /* 状态看板 */
        header { margin-bottom: 30px; }
        .welcome h1 { font-size: 1.6rem; font-weight: 300; margin: 0; }
        .welcome p { font-size: 0.85rem; opacity: 0.6; margin-top: 5px; }

        /* 呼吸视觉中心 */
        .breath-center {
            height: 200px; display: flex; align-items: center; justify-content: center;
            background: var(--glass); border-radius: 24px; margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .orb {
            width: 80px; height: 80px; background: white; border-radius: 50%;
            box-shadow: 0 0 40px rgba(255,255,255,0.2);
            animation: breathe 8s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.8); opacity: 0.6; }
        }

        /* 课程列表 */
        .course-section h2 { font-size: 1.1rem; font-weight: 400; margin-bottom: 20px; opacity: 0.9; }
        .course-list { display: grid; gap: 15px; }
        .course-card {
            background: var(--glass); border-radius: 20px; padding: 18px;
            display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .course-card:active { transform: scale(0.97); background: rgba(255,255,255,0.15); }
        .course-icon { font-size: 1.5rem; margin-right: 15px; width: 40px; text-align: center; }
        .course-info { flex: 1; }
        .course-info h4 { margin: 0; font-size: 0.95rem; }
        .course-info p { margin: 4px 0 0; font-size: 0.75rem; opacity: 0.5; }
        .play-indicator { color: var(--accent); font-size: 0.8rem; }

        /* 底部沉浸播放器 */
        .player-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.95); color: #000;
            padding: 20px 25px; border-radius: 24px 24px 0 0;
            display: none; transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }
        .player-panel.active { display: block; transform: translateY(0); }
        .player-flex { display: flex; align-items: center; justify-content: space-between; }
        .play-btn { width: 50px; height: 50px; background: #0f172a; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="aurora"></div>

<div class="container">
    <header class="welcome">
        <h1 id="greet">修行者，你好</h1>
        <p>今日修行计划：21天正念入门课程</p>
    </header>

    <div class="breath-center">
        <div class="orb"></div>
        <div style="position:absolute; font-size: 0.8rem; opacity: 0.4; letter-spacing: 2px;">随圆屏吸纳</div>
    </div>

    <div class="course-section">
        <h2>真人引导课程 · 2024版</h2>
        <div class="course-list">
            <!-- 课程 1：助眠 -->
            <div class="course-card" onclick="play('5分钟快速入眠引导', '专业指导', 'https://www.uclahealth.org/sites/default/files/sections/marc/audio/01_Free_Guided_Meditations_English/Mindfulness-and-Sleep.mp3')">
                <div class="course-icon">🌙</div>
                <div class="course-info">
                    <h4>5分钟快速入眠引导</h4>
                    <p>真人语音 · 睡前全身扫描</p>
                </div>
                <div class="play-indicator">播放课程</div>
            </div>
            <!-- 课程 2：减压 -->
            <div class="course-card" onclick="play('正念减压：呼吸觉察', '专业指导', 'https://www.uclahealth.org/sites/default/files/sections/marc/audio/01_Free_Guided_Meditations_English/Breath-Body-and-Sound-Meditation.mp3')">
                <div class="course-icon">🍃</div>
                <div class="course-info">
                    <h4>正念减压：呼吸觉察</h4>
                    <p>真人语音 · 缓解当下焦虑</p>
                </div>
                <div class="play-indicator">播放课程</div>
            </div>
            <!-- 课程 3：专注 -->
            <div class="course-card" onclick="play('5分钟快速静心(中文)', '冥想大师', 'https://feed.xyzcdn.net/itpt8p5q0f37/1628178877_056637.mp3')">
                <div class="course-icon">🎯</div>
                <div class="course-info">
                    <h4>5分钟快速静心 (中文)</h4>
                    <p>真人语音 · 适合办公间隙</p>
                </div>
                <div class="play-indicator">播放课程</div>
            </div>
            <!-- 课程 4：情绪 -->
            <div class="course-card" onclick="play('慈悲心引导：自我疗愈', '专业指导', 'https://www.uclahealth.org/sites/default/files/sections/marc/audio/01_Free_Guided_Meditations_English/Loving-Kindness-Meditation.mp3')">
                <div class="course-icon">💖</div>
                <div class="course-info">
                    <h4>慈悲心引导：自我疗愈</h4>
                    <p>真人语音 · 提升内在能量</p>
                </div>
                <div class="play-indicator">播放课程</div>
            </div>
        </div>
    </div>
</div>

<div class="player-panel" id="player">
    <div class="player-flex">
        <div style="flex: 1; padding-right: 15px;">
            <div id="p-title" style="font-weight: bold; font-size: 1rem;">课程名</div>
            <div id="p-teacher" style="font-size: 0.75rem; color: #666; margin-top: 4px;">真人引导老师：专业指导</div>
        </div>
        <div class="play-btn" onclick="togglePlay()" id="p-btn">⏸</div>
    </div>
    <!-- 进度条 -->
    <div style="height: 3px; background: #ddd; margin-top: 15px; border-radius: 2px;">
        <div id="p-bar" style="height: 100%; background: #0f172a; width: 0%;"></div>
    </div>
</div>

<audio id="audio-main"></audio>

<script>
    const audio = document.getElementById('audio-main');
    const player = document.getElementById('player');
    const pBtn = document.getElementById('p-btn');
    const pBar = document.getElementById('p-bar');

    function play(title, teacher, url) {
        document.getElementById('p-title').innerText = title;
        document.getElementById('p-teacher').innerText = "真人引导老师：" + teacher;
        
        audio.src = url;
        audio.play().catch(e => {
            alert("音频加载中，请稍后... 部分海外教育源需3-5秒响应。");
        });
        
        player.classList.add('active');
        pBtn.innerText = "⏸";
        
        // 进度监听
        audio.ontimeupdate = () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            pBar.style.width = progress + "%";
        };
    }

    function togglePlay() {
        if(audio.paused) { audio.play(); pBtn.innerText = "⏸"; }
        else { audio.pause(); pBtn.innerText = "▶"; }
    }

    // 时间问候
    const hour = new Date().getHours();
    const greet = hour < 10 ? "早安" : (hour < 18 ? "午后好" : "晚上好");
    document.getElementById('greet').innerText = `${greet}，修行者`;
</script>
</body>
</html>
